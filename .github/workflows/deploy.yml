name: Build & Deploy to GitHub Pages

on:
  # 手動觸發
  workflow_dispatch:

  # 每天台灣時間早上 8 點自動同步一次（UTC+8，所以是 UTC 00:00）
  schedule:
    - cron: "0 0 * * *"

  # 推送到 main 分支時自動觸發
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build site from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DB_ARCHIVES:  ${{ secrets.DB_ARCHIVES }}
          DB_ATELIER:   ${{ secrets.DB_ATELIER }}
          DB_RTW:       ${{ secrets.DB_RTW }}
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
